<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 240" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="10" y="60" width="320" height="120" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="108" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ブラウザ（HTML/JS）</text>
  <text x="170" y="142" text-anchor="middle" fill="#93c5fd" font-size="18">フロントエンド</text>

  <rect x="480" y="60" width="320" height="120" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="640" y="108" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー（Python）</text>
  <text x="640" y="142" text-anchor="middle" fill="#93c5fd" font-size="18">バックエンド</text>

  <rect x="950" y="60" width="320" height="120" rx="10" fill="#78350f" stroke="#d97706" stroke-width="2"/>
  <text x="1110" y="108" text-anchor="middle" fill="#fde68a" font-size="20" font-weight="bold">データベース（SQLite）</text>
  <text x="1110" y="142" text-anchor="middle" fill="#fde68a" font-size="18" font-family="'Menlo','Consolas',monospace">todo.db</text>

  <line x1="335" y1="100" x2="475" y2="100" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="405" y="88" text-anchor="middle" fill="#93c5fd" font-size="16">HTTPリクエスト</text>

  <line x1="475" y1="148" x2="335" y2="148" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="405" y="170" text-anchor="middle" fill="#a7f3d0" font-size="16">レスポンス</text>

  <line x1="805" y1="100" x2="945" y2="100" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)"/>
  <text x="875" y="88" text-anchor="middle" fill="#fde68a" font-size="16">SQLクエリ</text>

  <line x1="945" y1="148" x2="805" y2="148" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="875" y="170" text-anchor="middle" fill="#a7f3d0" font-size="16">結果</text>
</svg>
