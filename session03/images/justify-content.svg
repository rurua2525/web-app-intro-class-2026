<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <style>
    .label { fill: #93c5fd; font-size: 20px; font-weight: bold; }
    .container { fill: #1e3a8a; fill-opacity: 0.25; stroke: #60a5fa; stroke-width: 2; stroke-dasharray: 8 5; }
    .item-a { fill: #1e3a8a; stroke: #3b82f6; stroke-width: 2; }
    .item-b { fill: #155e75; stroke: #06b6d4; stroke-width: 2; }
    .item-c { fill: #064e3b; stroke: #10b981; stroke-width: 2; }
    .text-a { fill: #dbeafe; font-size: 18px; font-weight: bold; }
    .text-b { fill: #cffafe; font-size: 18px; font-weight: bold; }
    .text-c { fill: #a7f3d0; font-size: 18px; font-weight: bold; }
  </style>

  <text x="650" y="36" text-anchor="middle" fill="#93c5fd" font-size="22" font-weight="bold">justify-content（主軸＝横方向の配置）</text>

  <!-- flex-start: A,B,C 左寄せ -->
  <text x="200" y="100" text-anchor="end" class="label">flex-start</text>
  <rect x="240" y="70" width="1000" height="60" rx="6" class="container"/>
  <rect x="260" y="80" width="50" height="40" rx="6" class="item-a"/>
  <text x="285" y="106" text-anchor="middle" class="text-a">A</text>
  <rect x="320" y="80" width="50" height="40" rx="6" class="item-b"/>
  <text x="345" y="106" text-anchor="middle" class="text-b">B</text>
  <rect x="380" y="80" width="50" height="40" rx="6" class="item-c"/>
  <text x="405" y="106" text-anchor="middle" class="text-c">C</text>

  <!-- center -->
  <text x="200" y="190" text-anchor="end" class="label">center</text>
  <rect x="240" y="160" width="1000" height="60" rx="6" class="container"/>
  <rect x="655" y="170" width="50" height="40" rx="6" class="item-a"/>
  <text x="680" y="196" text-anchor="middle" class="text-a">A</text>
  <rect x="715" y="170" width="50" height="40" rx="6" class="item-b"/>
  <text x="740" y="196" text-anchor="middle" class="text-b">B</text>
  <rect x="775" y="170" width="50" height="40" rx="6" class="item-c"/>
  <text x="800" y="196" text-anchor="middle" class="text-c">C</text>

  <!-- flex-end -->
  <text x="200" y="280" text-anchor="end" class="label">flex-end</text>
  <rect x="240" y="250" width="1000" height="60" rx="6" class="container"/>
  <rect x="1050" y="260" width="50" height="40" rx="6" class="item-a"/>
  <text x="1075" y="286" text-anchor="middle" class="text-a">A</text>
  <rect x="1110" y="260" width="50" height="40" rx="6" class="item-b"/>
  <text x="1135" y="286" text-anchor="middle" class="text-b">B</text>
  <rect x="1170" y="260" width="50" height="40" rx="6" class="item-c"/>
  <text x="1195" y="286" text-anchor="middle" class="text-c">C</text>

  <!-- space-between -->
  <text x="200" y="370" text-anchor="end" class="label">space-between</text>
  <rect x="240" y="340" width="1000" height="60" rx="6" class="container"/>
  <rect x="260" y="350" width="50" height="40" rx="6" class="item-a"/>
  <text x="285" y="376" text-anchor="middle" class="text-a">A</text>
  <rect x="715" y="350" width="50" height="40" rx="6" class="item-b"/>
  <text x="740" y="376" text-anchor="middle" class="text-b">B</text>
  <rect x="1170" y="350" width="50" height="40" rx="6" class="item-c"/>
  <text x="1195" y="376" text-anchor="middle" class="text-c">C</text>

  <!-- space-around -->
  <text x="200" y="460" text-anchor="end" class="label">space-around</text>
  <rect x="240" y="430" width="1000" height="60" rx="6" class="container"/>
  <rect x="412" y="440" width="50" height="40" rx="6" class="item-a"/>
  <text x="437" y="466" text-anchor="middle" class="text-a">A</text>
  <rect x="715" y="440" width="50" height="40" rx="6" class="item-b"/>
  <text x="740" y="466" text-anchor="middle" class="text-b">B</text>
  <rect x="1018" y="440" width="50" height="40" rx="6" class="item-c"/>
  <text x="1043" y="466" text-anchor="middle" class="text-c">C</text>

  <!-- space-evenly -->
  <text x="200" y="550" text-anchor="end" class="label">space-evenly</text>
  <rect x="240" y="520" width="1000" height="60" rx="6" class="container"/>
  <rect x="437" y="530" width="50" height="40" rx="6" class="item-a"/>
  <text x="462" y="556" text-anchor="middle" class="text-a">A</text>
  <rect x="715" y="530" width="50" height="40" rx="6" class="item-b"/>
  <text x="740" y="556" text-anchor="middle" class="text-b">B</text>
  <rect x="993" y="530" width="50" height="40" rx="6" class="item-c"/>
  <text x="1018" y="556" text-anchor="middle" class="text-c">C</text>

  <!-- 凡例 -->
  <text x="650" y="650" text-anchor="middle" fill="#cbd5e1" font-size="16">破線の枠 = フレックスコンテナ（main axis = 横方向）</text>
  <text x="650" y="680" text-anchor="middle" fill="#cbd5e1" font-size="16">A / B / C = 同じ幅のフレックスアイテム</text>
</svg>
