<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="450" y="36" text-anchor="middle" fill="#93c5fd" font-size="22" font-weight="bold">display: flex あり（Flexbox）</text>

  <!-- container (subgraph 風 dashed) -->
  <rect x="50" y="70" width="800" height="180" rx="14" fill="#1e3a8a" fill-opacity="0.25" stroke="#60a5fa" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="76" y="100" fill="#93c5fd" font-size="18" font-weight="bold">.container</text>

  <!-- 要素A (primary blue) -->
  <rect x="100" y="120" width="200" height="100" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="178" text-anchor="middle" fill="#dbeafe" font-size="24" font-weight="bold">要素A</text>

  <!-- 要素B (cyan) -->
  <rect x="350" y="120" width="200" height="100" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="450" y="178" text-anchor="middle" fill="#cffafe" font-size="24" font-weight="bold">要素B</text>

  <!-- 要素C (emerald) -->
  <rect x="600" y="120" width="200" height="100" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="700" y="178" text-anchor="middle" fill="#a7f3d0" font-size="24" font-weight="bold">要素C</text>

  <!-- 横方向ラベルと矢印 -->
  <line x1="100" y1="305" x2="800" y2="305" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-slate)"/>
  <text x="450" y="345" text-anchor="middle" fill="#cbd5e1" font-size="18" font-weight="bold">横方向</text>
</svg>
