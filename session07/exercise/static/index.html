<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <h1>TODO App</h1>
  </header>

  <!-- メインコンテンツ -->
  <main class="todo-card">
      <!-- TODO入力エリア -->
      <form id="todo-form" class="input-area">
        <input
          type="text"
          id="todo-input"
          class="todo-input"
          placeholder="新しいTODOを入力..."
          autocomplete="off"
        >
        <button type="submit" class="todo-button">追加</button>
      </form>

      <!-- TODOリスト（JavaScriptで動的に生成） -->
      <ul id="todo-list" class="todo-list"></ul>

  </main>

  <!-- フッター -->
  <footer class="footer">
    <p>&copy; 2026 TODO App</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
