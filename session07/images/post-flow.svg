<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect x="60" y="20" width="200" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="58" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ユーザー</text>

  <rect x="380" y="20" width="280" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="520" y="58" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ブラウザ（JavaScript）</text>

  <rect x="780" y="20" width="280" height="60" rx="6" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="920" y="58" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー（FastAPI）</text>

  <rect x="1110" y="20" width="160" height="60" rx="6" fill="#78350f" stroke="#d97706" stroke-width="2"/>
  <text x="1190" y="58" text-anchor="middle" fill="#fde68a" font-size="20" font-weight="bold">SQLite</text>

  <line x1="160" y1="80" x2="160" y2="680" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="520" y1="80" x2="520" y2="680" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="920" y1="80" x2="920" y2="680" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1190" y1="80" x2="1190" y2="680" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

  <line x1="160" y1="120" x2="518" y2="120" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="340" y="108" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="bold">"牛乳を買う" を入力し[追加]クリック</text>

  <rect x="320" y="150" width="400" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="520" y="180" text-anchor="middle" fill="#451a03" font-size="14" font-weight="bold">input要素から値を取得</text>
  <text x="520" y="208" text-anchor="middle" fill="#451a03" font-size="14" font-weight="bold">JSON.stringify()で変換</text>

  <line x1="520" y1="270" x2="918" y2="270" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="720" y="258" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="bold">POST /todos {"title":"牛乳を買う"}</text>

  <rect x="780" y="300" width="280" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="920" y="330" text-anchor="middle" fill="#451a03" font-size="14" font-weight="bold">リクエスト受信</text>

  <line x1="920" y1="380" x2="1188" y2="380" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="1050" y="368" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="bold">INSERT</text>

  <line x1="1190" y1="430" x2="922" y2="430" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="1050" y="418" text-anchor="middle" fill="#a7f3d0" font-size="16" font-weight="bold">結果</text>

  <line x1="920" y1="490" x2="522" y2="490" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="720" y="478" text-anchor="middle" fill="#a7f3d0" font-size="14" font-weight="bold">{"id":4,"title":"牛乳を買う","done":false}</text>

  <rect x="280" y="520" width="480" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="520" y="550" text-anchor="middle" fill="#451a03" font-size="14" font-weight="bold">getTodos() で一覧を再取得</text>
  <text x="520" y="578" text-anchor="middle" fill="#451a03" font-size="14" font-weight="bold">DOM 更新（画面に反映）</text>
</svg>
