<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="60" y="20" width="200" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="58" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ユーザー</text>

  <rect x="380" y="20" width="240" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="58" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ブラウザ（JS）</text>

  <rect x="740" y="20" width="200" height="60" rx="6" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="840" y="58" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">FastAPI</text>

  <rect x="1060" y="20" width="200" height="60" rx="6" fill="#78350f" stroke="#d97706" stroke-width="2"/>
  <text x="1160" y="58" text-anchor="middle" fill="#fde68a" font-size="20" font-weight="bold">SQLite</text>

  <line x1="160" y1="80" x2="160" y2="520" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="500" y1="80" x2="500" y2="520" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="840" y1="80" x2="840" y2="520" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1160" y1="80" x2="1160" y2="520" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

  <line x1="160" y1="120" x2="498" y2="120" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="330" y="108" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">ボタンを押す</text>

  <rect x="280" y="150" width="440" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="500" y="180" text-anchor="middle" fill="#451a03" font-size="16" font-weight="bold">JavaScriptが実行される</text>
  <text x="500" y="208" text-anchor="middle" fill="#451a03" font-size="16" font-weight="bold">fetch() で HTTP リクエスト生成</text>

  <line x1="500" y1="270" x2="838" y2="270" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="670" y="258" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">HTTPリクエスト（例: POST /todos）</text>

  <rect x="660" y="300" width="380" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="850" y="338" text-anchor="middle" fill="#451a03" font-size="16" font-weight="bold">Pythonでリクエスト処理</text>

  <line x1="840" y1="400" x2="1158" y2="400" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="1000" y="388" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">データ保存</text>
</svg>
