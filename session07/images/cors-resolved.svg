<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect x="80" y="20" width="400" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="58" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ブラウザ（localhost:5500）</text>

  <rect x="800" y="20" width="400" height="60" rx="6" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="1000" y="58" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー（localhost:8000）</text>

  <line x1="280" y1="80" x2="280" y2="700" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1000" y1="80" x2="1000" y2="700" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

  <rect x="80" y="100" width="400" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="280" y="130" text-anchor="middle" fill="#451a03" font-size="16" font-weight="bold">fetch("/todos") を実行</text>

  <line x1="280" y1="190" x2="998" y2="190" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="640" y="178" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">プリフライトリクエスト（OPTIONS /todos）</text>

  <rect x="760" y="210" width="480" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1000" y="248" text-anchor="middle" fill="#451a03" font-size="16" font-weight="bold">CORSMiddleware設定済み！許可します</text>

  <line x1="1000" y1="310" x2="282" y2="310" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="640" y="298" text-anchor="middle" fill="#a7f3d0" font-size="18" font-weight="bold" font-family="'Menlo','Consolas',monospace">Access-Control-Allow-Origin: *</text>

  <rect x="80" y="330" width="400" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="280" y="362" text-anchor="middle" fill="#a7f3d0" font-size="16" font-weight="bold">許可された！通信OK</text>

  <line x1="280" y1="430" x2="998" y2="430" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="640" y="418" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">本来のリクエスト（GET /todos）</text>

  <rect x="800" y="450" width="400" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1000" y="482" text-anchor="middle" fill="#451a03" font-size="16" font-weight="bold">通常どおり処理</text>

  <line x1="1000" y1="540" x2="282" y2="540" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="640" y="528" text-anchor="middle" fill="#a7f3d0" font-size="18" font-weight="bold">JSONデータ（正常にデータを受け取れる！）</text>
</svg>
