  <rect x="780" y="20" width="280" height="60" rx="6" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="920" y="58" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー</text>

  <rect x="1110" y="20" width="160" height="60" rx="6" fill="#78350f" stroke="#d97706" stroke-width="2"/>
